apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: langgraph-agent
  namespace: ai-workloads
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: langgraph-agent
  minReplicas: 2          # Always HA — never single point of failure
  maxReplicas: 6          # Cap prevents runaway cost from agent loop abuse
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# PodDisruptionBudget — maintain availability during node drain / upgrades
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: langgraph-agent-pdb
  namespace: ai-workloads
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: langgraph-agent
